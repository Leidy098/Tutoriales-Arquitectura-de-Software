<!DOCTYPE html>
<html>
<body>

<h1>Compra Rapida</h1>

<p>Libro: <strong>{{ libro.titulo }}</strong></p>
<p>Precio Final (IVA): ${{ total }}</p>

<form method="post">
    {% csrf_token %}
    <label for="direccion">Direccion de envio:</label>
    <input id="direccion" name="direccion" type="text" placeholder="Calle 123 #45-67" />
    <button type="submit" style="background: orange;">
        Comprar Ya
    </button>
</form>

</body>
</html>
