# 1. Definimos ambos backends: el monolito y el microservicio
upstream django_v1 {
    server web_django:8000;
}

upstream flask_v2 {
    server pagos_flask:5000;
}

log_format upstream_trace '$remote_addr - $remote_user [$time_local] '
                          '"$request" $status upstream=$upstream_addr '
                          'upstream_status=$upstream_status '
                          'host="$host" referrer="$http_referer" '
                          'agent="$http_user_agent"';

server {
    listen 80;
    access_log /dev/stdout upstream_trace;
    error_log /dev/stderr warn;

    # RUTA VIEJA: Sigue yendo a Django
    location /api/v1/ {
        proxy_pass http://django_v1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # RUTA NUEVA: Estrangulamos la funcion de compra y la mandamos a Flask
    location /api/v2/comprar {
        proxy_pass http://flask_v2;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
